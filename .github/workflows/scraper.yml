name: Deploy and Scrape

on:
  push:
    branches:
      - main

  workflow_call:
    secrets:
      MEILISEARCH_MASTER_KEY:
        required: true

  workflow_dispatch:
    inputs:
      fetch-depth:
        description: "Number of commits to fetch for diff"
        required: false
        type: number
        default: 2
      full-scrape:
        description: "Force a full re-scrape"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    name: re-scrape documentation for Meilisearch
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: ${{ inputs.fetch-depth || 2 }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm ci

      - name: Generate Site
        run: pnpm run site:generate

      - name: Calculate diff depth
        id: calc
        run: echo "diff=$(( ${{ inputs.fetch-depth || 2 }} - 1 ))" >> $GITHUB_OUTPUT

      - name: Generate Only URLs
        id: generate
        continue-on-error: true
        env:
          DOCS_DIR: .site
          SCRAPER_CONFIG: config/scraper.json
        run: >
          pnpm exec vp-meilisearch-scrapper ${{ env.DOCS_DIR }} ${{ env.SCRAPER_CONFIG }}
          ${{ inputs.full-scrape && '--full-scrape' || '' }}
          --diff-depth ${{ steps.calc.outputs.diff }}

      - name: Skip scrape (no changes)
        if: steps.generate.outcome == 'failure'
        run: echo '::notice::No changed markdown files detected, skipping scrape.'

      - name: Run scraper
        if: steps.generate.outcome == 'success'
        env:
          HOST_URL: https://meilisearch.innenu.com
          API_KEY: ${{ secrets.MEILISEARCH_MASTER_KEY }}
          CONFIG_FILE_PATH: ${{ github.workspace }}/config/scraper.json
        run: |
          docker run -t --rm \
            --network=host \
            -e MEILISEARCH_HOST_URL=$HOST_URL \
            -e MEILISEARCH_API_KEY=$API_KEY \
            -e CONCURRENT_REQUESTS=2 \
            -e DOWNLOAD_DELAY=1.0 \
            -v $CONFIG_FILE_PATH:/docs-scraper/config.json \
            jqiue/docs-scraper:latest pipenv run ./docs_scraper config.json
