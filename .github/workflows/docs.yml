name: Generate and deploy docs

on:
  push:
    branches:
      - main
    paths:
      - "config/scraper.json"
      - "data/**"
      - "pages/**"
      - "scripts/**"
      - "site/**"
      - "package.json"

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Site
        run: pnpm run site:generate

      - name: Build Site
        run: pnpm run site:build

      - name: Deploy to gh pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .site/.vuepress/dist
          single-commit: true

  deploy-server:
    runs-on: ubuntu-latest
    needs: deploy-gh-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Config environment
        env:
          HOST: direct.innenu.com
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Host $HOST" >> ~/.ssh/config
          echo "  HostName $HOST" >> ~/.ssh/config
          echo "  Port $SSH_PORT" >> ~/.ssh/config
          echo "  User git" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_rsa" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

          git config --global user.name 'Mr.Hope'
          git config --global user.email 'mister-hope@outlook.com'

      - name: Deploy
        env:
          HOST: direct.innenu.com
          DEST: /www/wwwroot/innenu
          BRANCH: gh-pages
        run: |
          git push -f git@$HOST:$DEST $BRANCH
          ssh git@$HOST "cd $DEST && git reset --hard HEAD"

  scrape:
    needs: deploy-server
    uses: ./.github/workflows/scraper.yml
    secrets:
      MEILISEARCH_MASTER_KEY: ${{ secrets.MEILISEARCH_MASTER_KEY }}
