title: 电话入会
tags:
  - 防盗防骗
icon: phone
author: Mr.Hope
time: 2024-07-28T19:07:02.045Z
shareable: true
content:
  - tag: p
    text:
      - 对于他人要求您关机会开飞行模式的常规操作，大家可能都会产生警惕。但大家常用的腾讯会议软件有电话入会功能，也就是您可以拨打指定电话参加会议，在这个过程中您会占线。
      - 有的骗子在掌握您父母手机号后，会巧设名目让您参会，并要求您通过电话进行。在这一过程中，不仅您的电话会占线，您也会因为需要聆听会议内容而不会勤看手机。
