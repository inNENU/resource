shareable: true
content:
  - tag: title
    text: 报到时间

  - tag: text
    type: info
    header: 本科新生报到
    text:
      - 2025年8月30日、31日 (星期六、日)

  - tag: text
    type: info
    header: 研究生新生报到
    text:
      - 2025年9月4日、5日 (星期六、日)

  # TODO: Check this at 2025-08
  - tag: text
    type: tip
    header: 接站
    text:
      - 火车站、机场均将设有新生接待处，但无接站大巴。
    path: /newcomer/arrival/pickup

  - tag: list
    items:
      - text: 认准校区校门
        icon: gate
        path: locate

  - tag: title
    text: 提前或延后

  - tag: text
    type: warning
    header: 可以提前报到么
    text: 不可以。如实有特殊情况，请联系辅导员。

  - tag: text
    type: danger
    header: 因故不能按时报到
    text:
      - 必须事先向所在学院 (部) 提交书面申请进行请假，请假时间一般不得超过两周。
      - 未请假或逾期不报到者除因不可抗力等正当事由外，视为自动放弃入学资格。

  - tag: title
    text: 报到(接待)时间

  - tag: text
    text:
      - 7:00 - 22:00

  - tag: text
    type: note
    text:
      - 如需在其他时间段报到，需提前联系辅导员。

  - tag: title
    text: 报到(接待)地点

