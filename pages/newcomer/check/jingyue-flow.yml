title: 净月报到流程
tags:
  - 报到
  - 新生入学
icon: flow
author:
  - Mr.Hope
  - 王欣越
time: 2024-08-30T15:58:21.915Z
shareable: true
content:
  - tag: text
    type: tip
    text:
      - 报到前请确保录取通知书、身份证和小二寸照片在自己身上。

  - tag: title
    text: 前往净月 2 号门或 4 号门 (雕塑门、西北门)

  - tag: location
    header: 净月报到校门与报到处
    points:
      - loc: 43.829067,125.427172
        name: 二号门
        detail: 净月校区二号门
        path: jingyue/gate/gate2

      - loc: 43.826572,125.420067
        name: 四号门
        detail: 净月校区四号门
        path: jingyue/gate/gate4

      - loc: 43.826361,125.424778
        name: 报到处
        detail: 2024年净月校区报到处

  - tag: ol
    type: tip
    header: Mr.Hope の 友情提示
    text:
      - 净月大街两侧是没有停车位的，长期停车可能会被交警贴条。
      - 两个门相距报到点的路程差不多。

  - tag: text
    type: note
    text:
      - 上方地图会显示你的当前位置。你要做的就将自己的位置图标和报到处重合，这很简单吧?

  - tag: text
    text: 👇
    align: center
    style:
      font-weight: "500"
      font-size: 20px

  - tag: title
    text: 报到处报到

  - tag: text
    text:
      - 前往图书馆门口对应学院的报到处报到，完成入校登记。

  - tag: img
    src: $img/check/jingyue-2024.png
    desc: 净月 2024 年摆台示意图
    watermark: true

  - tag: text
    text:
      - 报到处的学长学姐会查验录取通知书，核验是否为本人，之后向你发放寝室钥匙、校园卡和空白银行卡。

  - tag: text
    type: note
    text:
      - 如果没有预先告诉你床位分配，工作人员也会告诉你床位分配情况。
      - 部分学院也可能在此步骤收纳一定的年级费。
      - 发送的银行卡是空白卡，还不能使用，后续学校会安排统一激活。部分学院可能会因为怕丢报到时不发银行卡，选择后续发放，请以学院安排为准。

  - tag: img
    src: $img/check/jingyue-check1.jpg
    desc: 报到现场
    watermark: true

  - tag: img
    src: $img/check/jingyue-check2.jpg
    desc: 报到现场
    watermark: true

  - tag: img
    src: $img/check/jingyue-check3.jpg
    desc: 报到现场
    watermark: true

  - tag: text
    text: 👇
    align: center
    style:
      font-weight: "500"
      font-size: 20px

  - tag: title
    text: 寝室登记

  - tag: text
    text:
      - 步行前往寝室大厅。凭住宿卡按照学院安排的床位和床号，在宿管阿姨处完成入住登记，之后使用电梯自行将行李运送上楼。

  - tag: text
    type: tip
    text:
      - 登记过程中需要两张小二寸照片，请提前拿出。

  - tag: title
    text: 报到后续步骤

  - tag: list
    items:
      - text: 报到后续流程
        icon: flow
        path: after-flow
