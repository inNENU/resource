content:
  - tag: title
    text: 为什么是这张照片!

  - tag: ul
    text:
      - 对于本科生来说，校园卡使用的是高考报考照片。
      - 对于研究生来说，校园卡使用的是研究生招生考试 的报考照片。

  - tag: text
    type: note
    text: 这是高校在新生入学前能够获得的新生唯一一张照片。

  - tag: title
    text: 照片可以换么?

  - tag: p
    text:
      - "对不起挂失卡后重新补办的校园卡上会仍然使用同一张照片。这张校园卡会时刻提醒您: 生活不易，且行且珍惜。"
      - "最后，提示您: 大学学生证照片好好照哦~ hhh"
