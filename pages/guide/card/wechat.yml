title: 微信校园卡
tags:
  - 校园卡
icon: wechat
author: Mr.Hope
time: 2025-07-07T07:13:13.743Z
shareable: true
content:
  - tag: text
    type: info
    text: 在成功关注并认证东北师范大学企业微信号 (需激活统一身份认证账号) 后，可以通过企业微信号中的‘校园卡’栏目，对校园卡进行充值。

  - tag: list
    items:
      - text: 企业号关注与认证
        icon: wechat
        path: /guide/account/wechat/

  - tag: title
    text: 充值

  - tag: text
    text: 打开微信进入东北师范大学企业号列表，并选择校园卡栏目。

  - tag: img
    src: $img/card/wechat-card-charge.jpg
    watermark: true

  - tag: text
    text: 点击屏幕下方的“校园卡”自定义菜单

  - tag: img
    src: $img/card/wechat-card.jpg
    desc: 在弹出的页面选择“校园码”
    watermark: true

  - tag: title
    text: 绑定微信与支付宝

  - tag: text
    text:
      - 默认情况下，虚拟校园卡的校园码只能使用卡内余额进行付费。如您需要使用微信或支付宝，需要进行绑定。

  - tag: text
    type: tip
    header: 认证注意事项
    text:
      - 微信需绑定企业微信所绑定微信号，无需认证，扫码即可绑定。
      - 支付宝须在扫码后，授权并输入学号及校园卡密码进行认证。

  - tag: img
    src: $img/card/wechat-pay.jpg
    desc: 微信绑定码

  - tag: img
    src: $img/card/alipay-pay.jpg
    desc: 支付宝绑定码

  - tag: title
    text: 使用说明

  - tag: ol
    text:
      - 生成的二维码仅一次有效，扫描后需刷新
      - 生成的二维码有效期为 60s，超出后需手动刷新
