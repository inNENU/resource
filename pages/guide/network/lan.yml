title: 有线上网
tags:
  - 校园网
icon: ethernet
author: Mr.Hope
time: 2025-07-08T10:57:42.310Z
shareable: true
content:
  - tag: text
    type: tip
    text: 在使用有线网之前，请准备足够长的网线。

  - tag: title
    text: 网线接口

  - tag: text
    text: 寝室内的网线接口在进门左手或右手边的墙壁上，每个寝室设有 4 个网线接口 (路由器端口) 供您使用，距离床位有一段距离。

  - tag: img
    src: $img/network/router.jpg
    desc: 寝室所装路由器
    watermark: true

  - tag: title
    text: 覆盖范围

  - tag: text
    text: 有线网已覆盖两校区所有楼宇。

  - tag: ul
    type: tip
    header: Mr.Hope の 提示
    text:
      - 这四个接口其实是寝室内安装的路由器的下行接口。
      - 如果寝室使用有线网络的人多于四个，不建议您购买交换机。使用交换机可能会增加网络延迟，其体验与直接使用 Wi-Fi 连接相近，因此在需要更多接口时，直接使用 Wi-Fi 可能是更便捷的选择。
      - "需要特别提示一下您: 网线需要自行购买。校内售卖的网线不仅价格略贵而且质量不佳，有条件的话务必考虑网购。"
      - 有线网络相对于无线网更加稳定，建议有线上游戏爱好的新生使用有线网络。
      - 如果您时常玩在线多人游戏，对网速及延迟要求较高，请务必使用有线网。
