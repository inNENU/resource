title: 本部校区快递介绍
tags:
  - 快递
icon: about
author: Mr.Hope
time: 2025-07-07T20:00:00.220Z
shareable: true
content:
  - tag: text
    type: tip
    text:
      - 建议新生优先选择在校内设有服务站的快递公司，以便于领取大件行李。
      - 其他快递服务也可寄达，但通常需要前往校外自提点（一般位于校门附近）取件。

  - tag: title
    text: 校内快递服务点

  - tag: text
    text:
      - 本部快递点在校园内的有：

  - tag: ul
    text:
      - 邮政 EMS
      - 邮政小包
      - 韵达
      - 圆通
      - 申通
      - 中通
      - 极兔
      - 黄马甲
      - 顺丰
      - 京东

  - tag: title
    text: 邮寄地址

  - tag: action
    header: 本部校区地址
    content: 吉林省长春市南关区南岭街道人民大街 5268 号

  - tag: action
    header: 邮政编码
    content: "130024"

  - tag: title
    text: 主要收件点

  - tag: list
    items:
      - text: 菜鸟驿站
        icon: cainiao
        path: benbu-cainiao

      - text: 快递柜
        icon: express-cabinet
        path: benbu-cabinet

  - tag: title
    text: 其他校外快递

  # FIXME: @YinXin 检查是否需要更新
  - tag: text
    header: 南门临时取件点
    text: |-
      本部校区南门（文昌路）外是部分校外快递的临时取件点。对于未在校内设立服务站的快递公司（如宅急送、天天快递、德邦快递等），其派件员通常会在此处等待师生取件。

  - tag: text
    type: tip
    text: |-
      取件地点通常位于文昌路北侧，请留意路边停靠的各快递公司派送车辆。

  - tag: text
    header: 邮政与 EMS 特别说明
    text:
      - 邮政（含EMS）的包裹支持楼宇派送。若收件地址精确到具体学院或行政楼，包裹通常会被送至该楼宇的传达室。
      - 若收件地址仅填写“东北师范大学”，包裹则会被统一送至校内菜鸟驿站集中处理。
