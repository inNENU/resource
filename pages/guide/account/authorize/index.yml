  - tag: title
    text: 介绍

  - tag: text
    text:
      - 在东北师范大学，你会使用各种各样的系统，比如教务系统、选课系统、网上服务大厅、融合门户、图书馆系统、缴费系统等。
      - 为了让你能够方便地使用这些系统，东北师范大学采用「统一身份认证系统」，即通过一组认证账户和密码、一个登录系统，自动认证并登录全部系统。

  - tag: img
    src: $img/account/login-page.jpg
    watermark: true

  - tag: title
    text: 账户管理

  - tag: text
    header: 账户名
    text:
      - 统一身份认证的账户名是学号，学号是 10 位数字，您收到的录取通知书证书编号和日后发放的校园卡💳卡号即是学号。

  - tag: text
    header: 账户创建
    text:
      - 在信息化办公室完成新生信息地址录入后，新生需要自行通过统一身份认证系统的账号激活功能校验个人信息后，设置密码与密保，完成账号激活。

  - tag: action
    header: 账号激活地址
    content: https://authserver.nenu.edu.cn/retrieve-password/accountActivation/index.html

  - tag: title
    text: 统一身份认证管理

  - tag: text
    text:
      - 如需管理自己的统一身份认证账号，请访问下方地址。

  - tag: action
    header: 校内地址
    content: https://authserver.nenu.edu.cn/authserver/login

  - tag: action
    header: 校外地址
    content: https://authserver-443.webvpn.nenu.edu.cn/authserver/login

  - tag: ul
    header: 功能
    text:
      - 设置登录别名
      - 修改登录密码、绑定手机与邮箱
      - 关联第三方账号（目前支持微信）
      - 管理可信浏览器
