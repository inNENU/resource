title: iOS 邮件客户端设置
tags:
  - 校园邮箱
icon: apple
author: Mr.Hope
time: 2023-09-22T16:59:13.261Z
shareable: true
content:
  - tag: text
    type: tip
    text:
      - 以下步骤将指导您在 iPhone 的邮件客户端上添加学校邮箱。
      - 本教程以原生(自带)邮件客户端为例

  - tag: ul
    text: 选择 “密码与账户”

  - tag: img
    src: $img/account/mail/ios-1.jpg
    watermark: true

  - tag: ul
    text: 选择 ”添加账户“

  - tag: img
    src: $img/account/mail/ios-2.jpg
    watermark: true

  - tag: ul
    text: 点击其他

  - tag: img
    src: $img/account/mail/ios-3.jpg
    watermark: true

  - tag: ul
    text: 选择 “添加邮箱账户”

  - tag: img
    src: $img/account/mail/ios-4.jpg
    watermark: true

  - tag: ul
    text: 输入账号密码，全名和描述可自行填写

  - tag: img
    src: $img/account/mail/ios-5.jpg
    watermark: true

  - tag: ul
    text: 按图示填写即可，邮箱账户和邮箱密码请填写自己对应的账户与密码

  - tag: text
    type: tip
    text:
      - 尽管学校支持 "smtp.nenu.edu.cn"，但是因为证书不符无法在原生邮件客户端上添加。
      - 在学校解决证书问题前，建议使用 163 企业邮提供的服务器。

  - tag: img
    src: $img/account/mail/ios-6.jpg
    watermark: true

  - tag: ul
    text: 在最后一步点击存储，即可完成邮箱账户的添加，之后打开自带的邮件 App 即可查看邮件。
