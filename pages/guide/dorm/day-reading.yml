content:
  - tag: title
    text: 住宿规定

  - tag: text
    text: 统招全日制本科学生均实行校内集中住宿制度。其中，家住长春市内的学生可办理走读。

  - tag: text
    type: info
    text:
      - 要求走读的学生需由本人提出申请，学生就读学院 (部) 审核同意，学生处复核批准。

  - tag: doc
    name: 走读工作安排与申请
    url: $file/dorm/zoudu.docx

  - tag: title
    text: 调整寝室

  - tag: text
    text:
      - 如果因为特殊情况，比如受伤、人际关系等需要进行寝室调整，需要填写下方文件，并上传系统进行申请。
      - 经辅导员、学院、学生宿舍综合管理办公室审批后，方可调整。

  - tag: doc
    name: 学生调宿申请表
    url: $file/dorm/change-dorm.docx

  - tag: action
    header: 宿舍管理系统
    content: https://gyglxt.nenu.edu.cn/?sid=https://gyglxt.nenu.edu.cn

  - tag: title
    text: 校外居住

  - tag: text
    text:
      - 如因身体原因或其他情况，需要在校外住宿的，请填写以下申请表。
      - 学生需要自行登录系统，并提交退宿申请表。

  - tag: doc
    name: 校外居住协议书
    url: $file/dorm/out.docx

  - tag: action
