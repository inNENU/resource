  - tag: text
    text: 入门后，左侧为男浴区和男女共用的休息室，右侧为女浴区。浴池内配有吹风机。浴池均为单间设计，每个单间内都带有衣帽柜。

  - tag: text
    type: tip
    text:
      - 由于学校男女比例原因，净月校区女浴区偶尔需要排队，男浴区则较少出现此情况。

