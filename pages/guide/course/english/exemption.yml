  - tag: title
    text: 申请条件

  - tag: p
    header: 秋季学期大学英语申请免修条件
    text:
      - 自 2024 级起，学生满足下列条件之一：
      - 托福成绩 80 分（且单项分数不低于19.5 分）或雅思成绩 6.0 分（且单项分数不低于 5.5 分）以上（成绩按折算成百分数后×1.2 计算）；
      - 大学英语四级考试成绩为 497 分（且单项分数不低于 70％）或大学英语六级考试成绩为425分（且单项分数不低于 60％）以上（成绩按折算成百分数后×1.1 计算）；
      - 普通类学生参加东北师范大学秋季期初英语水平测试（普通类）成绩为 75 分（包括75 分）以上（成绩按百分数×1.1 计算）；
      - 术科类学生参加东北师范大学秋季期初英语水平测试（术科类）成绩为75 分（包括 75 分）以上（成绩按百分数×1.1 计算）。

  - tag: p
    header: 春季学期大学英语申请免修条件
    text:
      - 自 2024 级起，学生满足下列条件之一：
      - 托福成绩 90 分（且单项分数不低于21 分）或雅思成绩 6.5 分（且单项分数不低于 6 分）以上的学生（成绩按折算成百分数后×1.2 计算）；
      - 大学英语四级考试成绩为 533 分（且单项分数不低于 75％）或大学英语六级考试成绩为497分（且单项分数不低于 70％）以上（成绩按折算成百分数后×1.1 计算）；
      - 普通类学生参加东北师范大学春季期初英语水平测试（普通类）成绩为 80 分（包括80 分）以上（成绩按百分数×1.1 计算）；术科类学生参加东北师范大学春季期初英语水平测试（术科类）成绩为80 分（包括 80 分）以上（成绩按百分数×1.1 计算）。

  - tag: text
    type: tip
    text:
      - 秋季学期与春季学期大学英语免修不可互通，都满足条件仍需重复申请！！！

