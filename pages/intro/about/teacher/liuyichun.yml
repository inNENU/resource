    text: 刘益春

  - tag: text
    header: 原东北师范大学校长

  - tag: text
    header: 中国科学院院士

  - tag: text
    header: 博士生导师

  - tag: p
    text:
      - 1962 年 12 月生，吉林辉南人，中共党员，教授，博士生导师，中国科学院院士，中国光学学会会士。现任中国真空学会副理事长，中国物理学会发光分会第十五届委员会主任，第八届国务院学位委员会学科评议组成员，吉林省科协副主席，国际发光会议（ICL）程委会委员（2020 大会主席），国际 II-VI 族化合物材料会议顾问委会委员，《真空科学与技术学报》主编、WILEY 国际学术期刊《InfoMat》副主编，紫外光发射材料与技术教育部重点实验室主任。曾任第十二、十三届全国人大代表，第四届全国教师教育课程资源专家委员会主任委员，第七届教育部科技委数理学部委员。国家杰出青年科学基金获得者，中国科学院优秀“百人计划”，教育部跨世纪优秀人才，吉林省首届杰出青年基金获得者、首批拔尖创新人才，获“全国模范教师”和“全国最美教师”荣誉称号，所领导的研究集体被评为“全国高校黄大年式教师团队”。

  - tag: p
    text:
      - 长期从事半导体光电功能材料与器件研究，在宽禁带氧化物半导体载流子调控、类脑忆阻器、高密度光存储、航天器特种光电热控材料等方面取得了系统的创造性成就，2014 年至 2025 年连续入选爱思惟尔中国高被引学者。相关研究成果，作为第一完成人，两次获得国家自然科学二等奖。长期致力于教师教育的发展与实践，提出并践行“创造的教育”理念，首创 U-G-S 教师教育新模式，并在全国推广。相关研究成果，作为第一完成人，分别获得国家级教学成果一等奖和二等奖。

