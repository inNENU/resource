  - tag: p
    text: 根据《教育部办公厅关于 2026 年普通高等学校依据台湾地区大学入学考试学科能力测试成绩招收台湾高中毕业生的通知》，结合我校实际情况，制定本简章。

  - tag: title
    text: 一、学校简介

  - tag: p
    text: 东北师范大学是教育部直属师范大学，国家"双一流"建设高校，国家"211 工程"重点建设大学，国家"985 工程"教师教育优势学科创新平台建设高校。学校位于吉林省长春市，本科招生专业分布在人民大街校区和净月大街校区。

  - tag: title
    text: 二、报名条件

  - tag: ul
    text:
      - 持有《台湾居民居住证》或《台湾居民来往大陆通行证》、以及在台湾居住的有效身份证明，考生所持证件须与考生本人信息一致，且在有效期之内。
      - 参加 2026 年台湾地区大学入学考试学科能力测试，成绩达到均标级及以上。

  - tag: title
    text: 三、招生计划及专业

  - tag: p
    text: 2026 年我校依据台湾地区大学入学考试学科能力测试成绩招收台湾高中毕业生 10 人。

  - tag: title
    text: 四、联系方式

  - tag: ul
    text:
      - "地址：吉林省长春市人民大街 5268 号"
      - "邮编：130024"
      - "电话：0431-85098500（招生办公室）"
