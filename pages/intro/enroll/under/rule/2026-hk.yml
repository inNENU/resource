  - tag: title
    text: 一、学校简介

  - tag: p
    text: 东北师范大学是教育部直属师范大学，国家"双一流"建设高校，国家"211 工程"重点建设大学，国家"985 工程"教师教育优势学科创新平台建设高校。学校位于吉林省长春市，本科招生专业分布在人民大街校区和净月大街校区。

  - tag: title
    text: 二、报名条件

  - tag: p
    text: 持有香港永久性居民身份证或非永久性身份证、港澳居民来往内地通行证或港澳居民居住证，并参加 2026 年香港中学文凭考试（HKDSE）的考生，考生所持证件须在有效期内。

  - tag: title
    text: 三、招生计划及专业

  - tag: p
    text: 2026 年我校面向香港中学文凭考试学生拟招收本科生 10 人。

  - tag: title
    text: 四、联系方式

