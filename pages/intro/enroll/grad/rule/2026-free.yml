content:
  - tag: title
    text: 2026 年公费师范毕业生申请免试攻读非全日制教育硕士专业学位研究生招生办法

  - tag: text
    type: info
    text: 根据教育部相关文件精神，结合我校实际情况，为做好我校 2026 年公费师范毕业生申请免试攻读非全日制教育硕士专业学位研究生招生工作，特制定本办法。欢迎东北师范大学公费师范毕业生积极报考！

  - tag: title
    text: 一、报考条件

  - tag: ul
    text:
      - 毕业于我校的公费师范专业本科毕业生；
      - 毕业后按协议履约任教满一学期，经任教学校考核合格并批准报考；
      - 工作年限在《师范生公费教育协议》规定的服务期内，违约、解约考生不得报名。

  - tag: title
    text: 二、招生（报考）专业

  - tag: ul
    text:
      - 招生专业详见《东北师范大学 2026 年接收推荐免试硕士研究生招生专业目录》中同时标注"非全日制专业学位"和"仅招收我校公费师范专业本科毕业生"的专业。
      - 考生所报考专业一般应与本科毕业专业相同或相近。
      - 跨专业报考须征得任教学校同意，并须按照报考院部要求加试。
      - 考生录取入学后不允许调换专业。

  - tag: title
    text: 三、报名、加试、复试、录取程序

  - tag: p
    text: >-
      考生须于 2025 年 9 月 28 日 14:30—10 月 13 日 17:00，登录"全国推荐免试攻读研究生（免初试、转段）信息公开管理服务系统"（网址: http://yz.chsi.com.cn/tm）完成所有报名程序。

  - tag: title
    text: 四、培养、毕业及学位授予

  - tag: p
    text: 公费师范生以非全日制形式学习教育硕士专业课程，学制三年，最长修业年限为六年。利用暑期回校集中授课，在职期间通过学习通平台远程学习。

  - tag: title
    text: 五、学费

  - tag: p
    text: 学费共计 2 万元，分两年缴纳。学习期间食宿费用、交通费用自理。

  - tag: title
    text: 六、咨询方式

  - tag: ul
    text:
