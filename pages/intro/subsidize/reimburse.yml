title: 毕业生基层就业学费补偿
tags:
  - 就业
  - 资助
icon: money
author: Mr.Hope
time: 2025-06-25T18:00:00.728Z
cite:
  - https://mp.weixin.qq.com/s/gLkj25_B2nf5itpfpEuZLw
shareable: true
content:
  - tag: title
    text: 简介

  - tag: p
    text:
      - 在读期间通过自筹方式缴纳学费的学生，毕业当年自愿到国家规定的中西部地区和艰苦偏远地区县级以下基层单位就业，签约服务年限三年及以上的，国家为其补偿学费或偿还国家助学贷款与利息。

  - tag: title
    text: 补助金额

  - tag: p
    text:
      - 本科生每年受助额度不超过 12000 元，分三年发放资助金，每年需进行在职在岗确认。
