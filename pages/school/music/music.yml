content:
  - tag: title
    text: 专业简介

  - tag: p
    text: 本专业旨在培养适应国家与社会发展需求，德智体美劳全面发展，具备扎实的音乐理论知识、综合实践技能，以及较高的文化艺术修养，具有卓越的音乐表演才能，能够从事专业音乐表演、音乐教育教学、音乐文化传播和社团音乐组织管理等工作的复合型音乐人才。

  - tag: title
    text: 主干课程

  - tag: ul
    text:
      - 中国民族音乐
      - 音乐基础理论
      - 视唱练耳
      - 和声
      - 曲式与作品分析
      - 中国音乐史与名作赏析
      - 西方音乐史与名作赏析
      - 歌曲写作
      - 乐器演奏
      - 管弦乐合奏
      - 流行表演
      - 排练课
      - 钢琴
      - 声乐
      - 歌曲伴奏编配与实践
      - 音乐心理学
      - 音乐表演美学
      - 舞台艺术实践
      - 音乐教学设计
      - 音乐教学技能综合训练
      - 专业实习
      - 毕业论文

  - tag: title
    text: 学费价格

  - tag: text
    text: 12000 元/年

  - tag: title
    text: 就业方向

  - tag: text
    text: 高等院校及科研院所或从事与音乐学相关的工作。
