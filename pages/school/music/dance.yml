content:
  - tag: title
    text: 专业简介

  - tag: p
    text: 为艺术类专业，旨在培养适应中国音乐与舞蹈基础教育发展需求，德智体美劳全面发展，具有坚定的政治思想信念、高尚的师德修养、良好的人文底蕴以及高度责任感和事业心，掌握扎实的音乐与舞蹈教育知识、理论与技能，具备较强的舞蹈编创能力与教学能力，具有终身学习意识和持续发展能力的中小学音乐舞蹈骨干教师。

  - tag: title
    text: 主干课程

  - tag: ul
    text:
      - 芭蕾基本功训练
      - 中国民族民间舞素材课
      - 古典舞身韵素材课
      - 拉班动作分析
      - 舞蹈概论
      - 外国舞蹈史及名作赏析
      - 中国舞蹈史及名作赏析
      - 基本乐理与视唱练耳
      - 现代舞基训
      - 编舞技法
      - 古典舞剑袖素材课
      - 东北地域民族民间舞素材课
      - 古典舞基训
      - 中小学舞蹈创编
      - 舞蹈教学分析与实践
      - 音乐课程与教学论
      - 舞蹈课程标准与教材分析
      - 舞蹈教学设计
      - 音乐教学技能综合训练
      - 基础实践
      - 应用实践
      - 毕业论文

  - tag: title
    text: 学费价格

  - tag: text
    text: 12000 元/年

  - tag: title
    text: 就业方向

  - tag: text
    text: 高等院校及社会院团或从事与舞蹈编导、舞蹈教育、舞蹈表演相关的工作。
