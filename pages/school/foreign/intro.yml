  - tag: title
    text: 学院简介

  - tag: p
    text: 外国语学院前身外语系始建于 1948 年。学院设有英语系、日德系、俄语系、商务英语系、大学外语系 5 个教学单位。现有外国语言文学一级学科博士学位授予权及博士后科研流动站；有英语语言文学、日语语言文学、俄语语言文学、外国语言学及应用语言学、比较文学与跨文化研究、外语教育 6 个二级学科博士点；有英语语言文学、日语语言文学、俄语语言文学、外国语言学及应用语言学、外语教育、翻译硕士、学科教学 7 个二级学科硕士点。科研与教学实力在东北领先，在国内居于前列。

  - tag: title
    text: 学科建设

  - tag: p
    text:
      - 学院现有外国语言文学一级学科博士授予权及博士后科研流动站；有英语语言文学、日语语言文学、俄语语言文学、外国语言学及应用语言学、比较文学与跨文化研究、外语教育6个二级学科博士点，有英语语言文学、日语语言文学、俄语语言文学、外国语言学及应用语言学、外语教育和翻译专业硕士、学科教学7个二级学科硕士点。科研与教学实力在东北领先，在国内居于前列。
      - 学院始终坚持"教学与科研并重、理论与实践并重、外语素质与人文素质并重"的教育教学理念。经过多年的建设和发展，现有教授 29 人，副教授 58 人。学院曾获得国家级教学成果二等奖 1 项，省级教学成果奖 4 项；建设省级精品课 5 门；多位教师获得吉林省教育科学优秀成果奖并出版国家级规划教材。
      - 英语专业于 2007 年被评为首批国家特色专业，于 2019 年获批国家级一流本科专业建设点，2025 年通过教育部师范类专业三级认证；日语、俄语专业于 2020 年获批国家级一流本科专业建设点，商务英语专业于 2021 年获批国家级一流本科专业建设点，日语、俄语专业已通过教育部师范类专业二级认证。
      - 东北师范大学外国语言文学学科在 2021 - 2025 年的五年间，获批各类项目 111 项，其中国家社科项目 16 项（包括重大项目 1 项，重点项目 1 项，后期资助项目 1 项、中华学术外译项目 1 项）、教育部人文社科项目 8 项，到账科研经费超 950 万元。近五年来发表学术论文 400 余篇，其中 SSCI 论文 76 篇，CSSCI 论文 171 篇；出版学术著作 60 部；获批咨询报告 12 项；各类科研获奖 13 项。

  - tag: title
    text: 人才培养

  - tag: p
    text:
      - 学院人才培养特色鲜明、成效显著，已形成具有广泛影响力的"东师外院"品牌。学生专业功底扎实、综合素质突出，在全国各类外语专业赛事中屡获佳绩，曾获"宝钢优秀学生奖"，入选《人民日报》国家奖学金获奖学生代表名录。
      - 学院升学就业质量持续向好，本科生总体升学率保持在 20% 左右，涵盖推免、考研及国（境）外深造等多元路径；毕业生就业率始终位居同类院校前列，就职于东北育才学校、辽宁省实验中学、比亚迪股份有限公司等优质单位，深受用人单位欢迎。
      - 学院坚持开放办学，注重培养学生国际视野与跨文化交流能力，多名学生赴美国、俄罗斯、日本等国家及香港、澳门、台湾地区高校交流学习或攻读硕士、博士学位。

