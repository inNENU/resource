content:
  - tag: title
    text: 专业简介

  - tag: p
    text: 为普通类专业，2026 级起招生。专业紧扣国家大数据与人工智能战略发展需求，旨在培养数学与统计理论功底扎实、数据思维敏锐、智能素养突出的数据科学人才。依托统计学"双一流"建设学科优势，构建"学术大师引领、行业精英护航"的多元协同育人平台。专业实行导师制、小班化、实战化、定制化的培养模式，建立一人一策个性化培养方案，侧重行业应用能力锻造，精准对接产业发展需求。

  - tag: title
    text: 主干课程

  - tag: ul
    text:
      - 数学分析
      - 高等代数
      - 解析几何
      - 概率论基础
      - 统计学导论
      - 统计学
      - 回归分析
      - 多元统计分析
      - 时间序列分析
      - 统计计算
      - 抽样调查与试验设计

  - tag: title
    text: 学费价格

  - tag: text
    text: 6320 元/年

  - tag: title
    text: 就业方向

  - tag: p
    text: 科研院所及高等院校的教学科研工作，亦可在 AI、IT、金融、医药、制造等行业从事调查咨询与数据分析相关工作。
