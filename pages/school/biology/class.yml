    text: 从 2020 年起，生物科学和生物技术以"生物科学大类"进行招生，学生在大二年级 (大一年级结束) 再进行专业方向选择。依托拔尖计划，生物科学专业设有"郝水班"，每年约 30 人，部分从生物科学大类中遴选产生。

