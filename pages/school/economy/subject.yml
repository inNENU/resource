content:
  - tag: title
    text: 会计学

  - tag: p
    text:
      - 东北师范大学会计学本科专业 2001 年获得教育部批准并开始招生，2003 年会计学硕士点获批，2010 年会计硕士专业学位获批；2007 年获批成为吉林省特色专业；2010 年成为国家级特色专业建设点，2018 年成为吉林省特色高水平专业。2011 年工商管理获批成为吉林省重点学科，2018 年成为吉林省优势特色学科，2019 年成为吉林省一流本科建设专业。

  - tag: title
    text: 人力资源管理专业

  - tag: p
    text:
      - 东北师范大学人力资源管理专业 2001 年开始招生。沁浸着东北师范大学学高为师德高为范的文化底蕴，东北师范大学人力资源管理专业的学生专业基础扎实，工作严谨认真，视野开阔，思维活跃，有韧劲，有担当。这些特点受到用人单位的广泛认可和好评。2015 年被评为吉林省特色专业，2018 年学院工商管理学科(包括人力资源管理、市场营销、会计学)被评为为吉林省“十三五”高水平学科建设优势特色学科 A 类。
